<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

     <img src="IMG/logoPP2.jpeg" alt="Logo" class="logo">

    <h1>Ituzaingó a un Toque</h1>

</header>

<section class="productos">

    <div class="card">

        <img src="IMG/remeraoversize.webp" alt="Remera Oversize">

        <div class="info">
            <h3>Remera Oversize</h3>
            <p>$55.000</p>
            <span>Urbana</span>
        </div>

    </div>

    <div class="card">

        <img src="IMG/buzoVelez.webp" alt="Buzo Vélez"> 

        <div class="info">
            <h3>Buzo Canguro Velez Sarsfield</h3>
            <p>$60.000</p>
            <span>Casual</span>
        </div>

    </div>

    <div class="card">

        <img src="IMG/zapatillas.webp" alt="Zapatillas">

        <div class="info">
            <h3>Zapatillas Urbanas</h3>
            <p>$120.000</p>
            <span>Calzado</span>
        </div>

    </div>

</section>

</body>
</html>
