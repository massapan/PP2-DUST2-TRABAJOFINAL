<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Local</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>Registrar Local</h1>

    <form id="localForm">

        <input
            type="text"
            id="nombreLocal"
            placeholder="Nombre del local"
            required
        >

        <input
            type="text"
            id="direccion"
            placeholder="Dirección"
            required
        >

        <textarea
            id="descripcion"
            placeholder="Descripción del local"
            rows="5"
            required
        ></textarea>

        <button type="submit">
            Guardar Local
        </button>

    </form>

    <p id="mensaje"></p>

</div>

<script src="js/local.js"></script>

</body>
</html>
